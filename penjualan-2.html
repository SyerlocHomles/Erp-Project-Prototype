<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERP Toko — Penjualan</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f2f5;color:#2d3748;min-height:100vh;font-size:13px}
input,select,textarea,button{font-family:inherit}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#f0f2f5}
::-webkit-scrollbar-thumb{background:#cbd5e0;border-radius:4px}
.sidebar{position:fixed;top:0;left:0;height:100vh;background:#1a2e4a;width:52px;transition:width .25s cubic-bezier(.4,0,.2,1);z-index:200;display:flex;flex-direction:column;overflow:hidden;box-shadow:2px 0 8px rgba(0,0,0,.15)}
.sidebar.open{width:260px}
.sidebar-header{display:flex;align-items:center;padding:0 14px;height:56px;border-bottom:1px solid rgba(255,255,255,.08);cursor:pointer;flex-shrink:0;gap:10px}
.sidebar-header:hover{background:rgba(255,255,255,.05)}
.hamburger{width:24px;height:24px;display:flex;flex-direction:column;justify-content:center;gap:5px;flex-shrink:0}
.hamburger span{display:block;height:2px;background:#fff;border-radius:2px}
.sidebar-logo{color:#fff;font-weight:700;font-size:15px;white-space:nowrap;opacity:0;transition:opacity .15s;pointer-events:none}
.sidebar.open .sidebar-logo{opacity:1}
.sidebar-back{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.08);cursor:pointer;color:rgba(255,255,255,.7);font-size:12px;transition:background .15s;overflow:hidden;flex-shrink:0}
.sidebar-back:hover{background:rgba(255,255,255,.07);color:#fff}
.back-label{opacity:0;transition:opacity .15s;white-space:nowrap}
.sidebar.open .back-label{opacity:1}
.sidebar-nav{flex:1;overflow-y:auto;overflow-x:hidden;padding:6px 0}
.nav-item{flex-shrink:0}
.nav-btn{display:flex;align-items:center;padding:10px 14px;cursor:pointer;width:100%;border:none;background:transparent;color:rgba(255,255,255,.75);transition:all .15s;text-align:left;gap:0;overflow:hidden}
.nav-btn:hover{background:rgba(255,255,255,.08);color:#fff}
.nav-btn.active{background:rgba(59,130,246,.2);color:#93c5fd}
.nav-icon{width:24px;height:24px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px}
.nav-label-wrap{display:flex;align-items:center;flex:1;min-width:0;opacity:0;transition:opacity .15s;overflow:hidden;padding-left:10px}
.sidebar.open .nav-label-wrap{opacity:1}
.nav-label{font-size:12.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.nav-arrow{font-size:9px;flex-shrink:0;transition:transform .2s;margin-left:6px}
.nav-arrow.open{transform:rotate(90deg)}
.nav-sub{overflow:hidden;max-height:0;transition:max-height .3s cubic-bezier(.4,0,.2,1)}
.nav-sub.open{max-height:500px}
.nav-sub-item{display:flex;align-items:center;gap:7px;padding:8px 14px 8px 48px;cursor:pointer;color:rgba(255,255,255,.55);font-size:12px;transition:all .15s;white-space:nowrap;overflow:hidden}
.nav-sub-item:hover{background:rgba(255,255,255,.06);color:#e2e8f0}
.nav-sub-item.active{color:#60a5fa;background:rgba(59,130,246,.12);font-weight:600}
.nav-sub-item::before{content:'';width:4px;height:4px;border-radius:50%;background:currentColor;flex-shrink:0;opacity:.6}
.nav-sub-item.active::before{opacity:1}
.topbar{position:fixed;top:0;left:52px;right:0;height:56px;background:#fff;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;padding:0 20px;gap:12px;z-index:100;transition:left .25s cubic-bezier(.4,0,.2,1);box-shadow:0 1px 3px rgba(0,0,0,.05)}
.topbar.sidebar-open{left:260px}
.topbar-info{flex:1}
.topbar-title{font-size:15px;font-weight:700;color:#1a2e4a}
.topbar-breadcrumb{font-size:11px;color:#94a3b8;margin-top:1px}
.topbar-actions{display:flex;align-items:center;gap:8px}
.icon-btn{width:34px;height:34px;border-radius:8px;border:1px solid #e2e8f0;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#64748b;transition:all .15s;font-size:15px}
.icon-btn:hover{background:#f8fafc;color:#1a2e4a}
.main-wrap{margin-left:52px;padding-top:56px;min-height:100vh;transition:margin-left .25s cubic-bezier(.4,0,.2,1)}
.main-wrap.sidebar-open{margin-left:260px}
.main-content{padding:20px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:199;display:none}
.overlay.show{display:block}
.card{background:#fff;border-radius:10px;border:1px solid #e2e8f0;box-shadow:0 1px 3px rgba(0,0,0,.04);margin-bottom:14px;overflow:visible}
.card-header{padding:13px 18px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.card-title{font-size:13px;font-weight:700;color:#1a2e4a}
.card-body{padding:18px}
.tab-bar{display:flex;border-bottom:2px solid #e2e8f0;margin-bottom:18px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{padding:9px 16px;border:none;background:transparent;cursor:pointer;font-size:12.5px;font-weight:600;color:#94a3b8;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all .15s;flex-shrink:0}
.tab-btn:hover{color:#1a2e4a}
.tab-btn.active{color:#1d4ed8;border-bottom-color:#1d4ed8}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-label{font-size:11.5px;font-weight:600;color:#475569}
.form-label .req{color:#dc2626}
.req{color:#dc2626}
.form-input,.form-select,.form-textarea{padding:8px 11px;border:1px solid #e2e8f0;border-radius:7px;font-size:13px;color:#1a2e4a;outline:none;transition:border-color .15s;background:#fff;width:100%}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.08)}
.form-textarea{resize:vertical;min-height:80px}
.form-hint{font-size:11px;color:#94a3b8;margin-top:2px;line-height:1.4}
.form-divider{border:none;border-top:1px solid #f1f5f9;margin:16px 0}
.section-title{font-size:12px;font-weight:700;color:#1a2e4a;text-transform:uppercase;letter-spacing:.5px;margin:16px 0 10px;padding-bottom:6px;border-bottom:2px solid #e2e8f0;display:flex;align-items:center;gap:7px}
.section-title:first-child{margin-top:0}
.toggle{position:relative;width:40px;height:22px;flex-shrink:0;margin-top:1px}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-slider{position:absolute;inset:0;background:#e2e8f0;border-radius:22px;cursor:pointer;transition:.2s}
.toggle-slider::before{content:'';position:absolute;width:16px;height:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.toggle input:checked+.toggle-slider{background:#3b82f6}
.toggle input:checked+.toggle-slider::before{transform:translateX(18px)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:7px;border:none;font-size:12.5px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-primary{background:#1a2e4a;color:#fff}.btn-primary:hover{background:#243d63}
.btn-secondary{background:#f1f5f9;color:#475569;border:1px solid #e2e8f0}.btn-secondary:hover{background:#e2e8f0}
.btn-danger{background:#dc2626;color:#fff}.btn-danger:hover{background:#b91c1c}
.btn-sm{padding:5px 10px;font-size:11.5px}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead tr{background:#f8fafc}
th{padding:9px 12px;text-align:left;font-weight:600;color:#64748b;border-bottom:2px solid #e2e8f0;white-space:nowrap;font-size:11px;text-transform:uppercase;letter-spacing:.4px}
td{padding:9px 12px;border-bottom:1px solid #f1f5f9;color:#374151;vertical-align:middle}
tr:hover td{background:#fafbff}
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600}
.info-box{background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:12px 14px;font-size:12px;color:#1d4ed8;line-height:1.5;margin-bottom:14px}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.page-title{font-size:17px;font-weight:700;color:#1a2e4a}
.page-sub{font-size:12px;color:#94a3b8;margin-top:3px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.18);width:100%;max-width:480px;overflow:hidden;max-height:90vh;display:flex;flex-direction:column}
.modal-header{padding:16px 20px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-title{font-size:14px;font-weight:700;color:#1a2e4a}
.modal-close{width:28px;height:28px;border-radius:6px;border:none;background:#f1f5f9;cursor:pointer;color:#64748b;font-size:14px;display:flex;align-items:center;justify-content:center}
.modal-body{padding:20px;overflow-y:auto}
.modal-footer{padding:14px 20px;border-top:1px solid #f1f5f9;display:flex;justify-content:flex-end;gap:8px;flex-shrink:0}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useRef,useEffect}=React;

const MENUS_PENJUALAN=[
  {id:"penjualan",label:"Penjualan",icon:"🧾",sub:[{id:"penawaran-penjualan",label:"Penawaran Penjualan"},{id:"pesanan-penjualan",label:"Pesanan Penjualan"},{id:"pengiriman-pesanan",label:"Pengiriman Pesanan"},{id:"faktur-penjualan",label:"Faktur Penjualan"},{id:"uang-muka-penjualan",label:"Uang Muka Penjualan"},{id:"penerimaan-penjualan",label:"Penerimaan Penjualan"},{id:"retur-penjualan",label:"Retur Penjualan"},{id:"pelanggan",label:"Pelanggan"}]},
  {id:"pembelian",label:"Pembelian",icon:"📦",sub:[{id:"pesanan-pembelian",label:"Pesanan Pembelian"},{id:"penerimaan-barang",label:"Penerimaan Barang"},{id:"uang-muka-pembelian",label:"Uang Muka Pembelian"},{id:"faktur-pembelian",label:"Faktur Pembelian"},{id:"pembayaran-pembelian",label:"Pembayaran Pembelian"},{id:"retur-pembelian",label:"Retur Pembelian"},{id:"pemasok",label:"Pemasok"}]},
  {id:"persediaan",label:"Persediaan",icon:"🗃️",sub:[{id:"barang-jasa",label:"Barang & Jasa"},{id:"kategori-barang",label:"Kategori Barang"},{id:"satuan-barang",label:"Satuan Barang"},{id:"gudang",label:"Gudang"},{id:"permintaan-barang",label:"Permintaan Barang"},{id:"pindah-barang",label:"Pindah Barang"},{id:"penyesuaian",label:"Penyesuaian Persediaan"}]},
  {id:"laporan",label:"Daftar Laporan",icon:"📊",sub:[{id:"lap-keuangan",label:"Keuangan"},{id:"lap-kas-bank",label:"Kas & Bank"},{id:"lap-piutang",label:"Piutang"},{id:"lap-penjualan",label:"Penjualan"},{id:"lap-hutang",label:"Utang"},{id:"lap-pembelian",label:"Pembelian"},{id:"lap-persediaan",label:"Persediaan"}]},
];

const PAGE_META={
  "penawaran-penjualan":{title:"Penawaran Penjualan",crumb:"Penjualan > Penawaran Penjualan"},
  "pesanan-penjualan":{title:"Pesanan Penjualan",crumb:"Penjualan > Pesanan Penjualan"},
  "pengiriman-pesanan":{title:"Pengiriman Pesanan",crumb:"Penjualan > Pengiriman Pesanan"},
  "faktur-penjualan":{title:"Faktur Penjualan",crumb:"Penjualan > Faktur Penjualan"},
  "uang-muka-penjualan":{title:"Uang Muka Penjualan",crumb:"Penjualan > Uang Muka Penjualan"},
  "penerimaan-penjualan":{title:"Penerimaan Penjualan",crumb:"Penjualan > Penerimaan Penjualan"},
  "retur-penjualan":{title:"Retur Penjualan",crumb:"Penjualan > Retur Penjualan"},
  pelanggan:{title:"Pelanggan",crumb:"Penjualan > Pelanggan"},
  "pesanan-pembelian":{title:"Pesanan Pembelian",crumb:"Pembelian > Pesanan Pembelian"},
  "penerimaan-barang":{title:"Penerimaan Barang",crumb:"Pembelian > Penerimaan Barang"},
  "uang-muka-pembelian":{title:"Uang Muka Pembelian",crumb:"Pembelian > Uang Muka Pembelian"},
  "faktur-pembelian":{title:"Faktur Pembelian",crumb:"Pembelian > Faktur Pembelian"},
  "pembayaran-pembelian":{title:"Pembayaran Pembelian",crumb:"Pembelian > Pembayaran Pembelian"},
  "retur-pembelian":{title:"Retur Pembelian",crumb:"Pembelian > Retur Pembelian"},
  pemasok:{title:"Pemasok",crumb:"Pembelian > Pemasok"},
  "barang-jasa":{title:"Barang & Jasa",crumb:"Persediaan > Barang & Jasa"},
  "kategori-barang":{title:"Kategori Barang",crumb:"Persediaan > Kategori Barang"},
  "satuan-barang":{title:"Satuan Barang",crumb:"Persediaan > Satuan Barang"},
  gudang:{title:"Gudang",crumb:"Persediaan > Gudang"},
  "permintaan-barang":{title:"Permintaan Barang",crumb:"Persediaan > Permintaan Barang"},
  "pindah-barang":{title:"Pindah Barang",crumb:"Persediaan > Pindah Barang"},
  penyesuaian:{title:"Penyesuaian Persediaan",crumb:"Persediaan > Penyesuaian Persediaan"},
  "lap-keuangan":{title:"Laporan Keuangan",crumb:"Laporan > Keuangan"},
  "lap-kas-bank":{title:"Laporan Kas & Bank",crumb:"Laporan > Kas & Bank"},
  "lap-piutang":{title:"Laporan Piutang",crumb:"Laporan > Piutang"},
  "lap-penjualan":{title:"Laporan Penjualan",crumb:"Laporan > Penjualan"},
  "lap-hutang":{title:"Laporan Utang",crumb:"Laporan > Utang"},
  "lap-pembelian":{title:"Laporan Pembelian",crumb:"Laporan > Pembelian"},
  "lap-persediaan":{title:"Laporan Persediaan",crumb:"Laporan > Persediaan"},
};

const COA_DEFAULT=[
  {kode:"1-0001",nama:"Kas Kecil",kelompok:"Aset",tipe:"D"},{kode:"1-0002",nama:"Bank BCA",kelompok:"Aset",tipe:"D"},{kode:"1-0005",nama:"Kas Besar",kelompok:"Aset",tipe:"D"},
  {kode:"1-0100",nama:"Piutang Usaha",kelompok:"Aset",tipe:"D"},{kode:"1-0200",nama:"Persediaan Barang Dagang",kelompok:"Aset",tipe:"D"},
  {kode:"2-0001",nama:"Hutang Usaha",kelompok:"Liabilitas",tipe:"K"},{kode:"2-0003",nama:"Hutang Pajak PPN",kelompok:"Liabilitas",tipe:"K"},
  {kode:"4-0001",nama:"Penjualan",kelompok:"Pendapatan",tipe:"K"},{kode:"4-0003",nama:"Diskon Penjualan",kelompok:"Pendapatan",tipe:"D"},
  {kode:"5-0001",nama:"HPP",kelompok:"HPP",tipe:"D"},
  {kode:"6-0001",nama:"Beban Gaji & Tunjangan",kelompok:"Beban Operasional",tipe:"D"},{kode:"6-0002",nama:"Beban Sewa Kantor/Toko",kelompok:"Beban Operasional",tipe:"D"},
  {kode:"6-0003",nama:"Beban Listrik & Air",kelompok:"Beban Operasional",tipe:"D"},{kode:"6-0004",nama:"Beban Telepon & Internet",kelompok:"Beban Operasional",tipe:"D"},
  {kode:"6-0005",nama:"Beban Transportasi",kelompok:"Beban Operasional",tipe:"D"},{kode:"6-0006",nama:"Beban Parkir & Tol",kelompok:"Beban Operasional",tipe:"D"},
  {kode:"6-0010",nama:"Beban Iklan & Promosi",kelompok:"Beban Operasional",tipe:"D"},{kode:"7-0001",nama:"Beban Bunga Pinjaman",kelompok:"Beban Lain-lain",tipe:"D"},
  {kode:"7-0002",nama:"Beban Administrasi Bank",kelompok:"Beban Lain-lain",tipe:"D"},
];

const fmt=(n)=>new Intl.NumberFormat("id-ID",{minimumFractionDigits:0}).format(n||0);
const fmtRp=(n)=>`Rp ${fmt(n)}`;
const today=()=>new Date().toISOString().split("T")[0];

function COASearch({onSelect,placeholder="Cari kode atau nama COA..."}){
  const[q,setQ]=useState("");const[show,setShow]=useState(false);const[selected,setSelected]=useState(null);
  const ref=useRef();
  const filtered=q.length>0?COA_DEFAULT.filter(c=>c.kode.toLowerCase().includes(q.toLowerCase())||c.nama.toLowerCase().includes(q.toLowerCase())).slice(0,10):[];
  useEffect(()=>{const h=(e)=>{if(ref.current&&!ref.current.contains(e.target))setShow(false);};document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);},[]);
  const pick=(c)=>{setSelected(c);setQ(c.kode+" - "+c.nama);setShow(false);onSelect(c);};
  const clear=()=>{setSelected(null);setQ("");onSelect(null);};
  return(
    <div ref={ref} style={{position:"relative"}}>
      <div style={{display:"flex",gap:6}}>
        <input className="form-input" value={q} onChange={e=>{setQ(e.target.value);setShow(true);if(!e.target.value)clear();}} onFocus={()=>setShow(true)} placeholder={placeholder} style={{flex:1}}/>
        {selected&&<button onClick={clear} style={{background:"#fee2e2",border:"none",borderRadius:6,color:"#dc2626",padding:"0 10px",cursor:"pointer",fontSize:12}}>✕</button>}
      </div>
      {show&&filtered.length>0&&(
        <div style={{position:"absolute",top:"100%",left:0,right:0,background:"#fff",border:"1px solid #e2e8f0",borderRadius:8,zIndex:999,maxHeight:220,overflowY:"auto",boxShadow:"0 4px 12px rgba(0,0,0,.1)"}}>
          {filtered.map(c=>(
            <div key={c.kode} onClick={()=>pick(c)} style={{padding:"8px 12px",cursor:"pointer",borderBottom:"1px solid #f1f5f9",display:"flex",justifyContent:"space-between",alignItems:"center"}} onMouseEnter={e=>e.currentTarget.style.background="#f8fafc"} onMouseLeave={e=>e.currentTarget.style.background=""}>
              <div><span style={{fontFamily:"monospace",fontWeight:700,color:"#1d4ed8",fontSize:12}}>{c.kode}</span><span style={{fontSize:12.5,color:"#374151",marginLeft:8}}>{c.nama}</span></div>
              <span style={{fontSize:10,padding:"1px 6px",borderRadius:10,background:"#f1f5f9",color:"#64748b"}}>{c.kelompok}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function Sidebar({open,setOpen,page,setPage}){
  const[openCat,setOpenCat]=useState(null);
  const activeCat=MENUS_PENJUALAN.find(m=>m.sub.some(s=>s.id===page))?.id||null;
  const toggle=(id)=>setOpenCat(c=>c===id?null:id);
  const goTo=(id)=>{setPage(id);if(window.innerWidth<768)setOpen(false);};
  return(
    <div className={`sidebar${open?" open":""}`}>
      <div className="sidebar-header" onClick={()=>setOpen(o=>!o)}><div className="hamburger"><span/><span/><span/></div><span className="sidebar-logo">ERP Toko</span></div>
      <div className="sidebar-back" onClick={()=>window.location.href="index.html"}>
        <span style={{fontSize:18,flexShrink:0}}>{"<"}</span>
        <span className="back-label">{"<-"} Kembali ke Menu Utama</span>
      </div>
      <nav className="sidebar-nav">
        {MENUS_PENJUALAN.map(m=>{
          const isOpen=(openCat===m.id)||(openCat===null&&activeCat===m.id);
          return(
            <div key={m.id} className="nav-item">
              <div className={`nav-btn${activeCat===m.id?" active":""}`} onClick={()=>toggle(m.id)}>
                <span className="nav-icon">{m.icon}</span>
                <div className="nav-label-wrap"><span className="nav-label">{m.label}</span><span className={`nav-arrow${isOpen&&open?" open":""}`}>{">"}</span></div>
              </div>
              <div className={`nav-sub${isOpen&&open?" open":""}`}>
                {m.sub.map(s=><div key={s.id} className={`nav-sub-item${page===s.id?" active":""}`} onClick={()=>goTo(s.id)}>{s.label}</div>)}
              </div>
            </div>
          );
        })}
      </nav>
    </div>
  );
}

function Topbar({page,open}){
  const m=PAGE_META[page]||{title:"Penjualan",crumb:"ERP Toko"};
  return(
    <div className={`topbar${open?" sidebar-open":""}`}>
      <div className="topbar-info"><div className="topbar-title">{m.title}</div><div className="topbar-breadcrumb">{m.crumb}</div></div>
      <div className="topbar-actions"><button className="icon-btn">🔔</button><button className="icon-btn">🔍</button></div>
    </div>
  );
}

function PlaceholderPage({pageId}){
  const m=PAGE_META[pageId]||{title:pageId,crumb:""};
  return(
    <div>
      <div className="page-header"><div><div className="page-title">{m.title}</div><div className="page-sub">{m.crumb}</div></div><div style={{display:"flex",gap:8}}><button className="btn btn-secondary btn-sm">🔍 Cari</button><button className="btn btn-primary btn-sm">+ Tambah Baru</button></div></div>

  );

                    <td style={{padding:"6px 8px"}}><input type="number" value={item.harga} onChange={e=>updateItem(i,"harga",e.target.value)} style={{width:95,padding:"4px 6px",border:"1px solid #e2e8f0",borderRadius:5,textAlign:"right",fontSize:12,fontFamily:"inherit"}}/></td>
                    <td style={{padding:"6px 8px"}}>
                      <div style={{display:"flex",gap:4,alignItems:"center"}}>
                        <input type="number" value={item.diskon} onChange={e=>updateItem(i,"diskon",e.target.value)} style={{width:55,padding:"4px 6px",border:"1px solid #e2e8f0",borderRadius:5,textAlign:"right",fontSize:12,fontFamily:"inherit"}}/>
                        <div style={{display:"flex",border:"1px solid #e2e8f0",borderRadius:5,overflow:"hidden"}}>
                          {["%","Rp"].map(t=><button key={t} onClick={()=>updateItem(i,"diskon_tipe",t==="%"?"pct":"rp")} style={{padding:"3px 7px",border:"none",background:item.diskon_tipe===(t==="%"?"pct":"rp")?"#1a2e4a":"#f8fafc",color:item.diskon_tipe===(t==="%"?"pct":"rp")?"#fff":"#64748b",fontSize:11,cursor:"pointer",fontWeight:600}}>{t}</button>)}
                        </div>
                      </div>
                    </td>
                    <td style={{padding:"6px 8px",textAlign:"right",fontWeight:700,color:"#1a2e4a"}}>Rp {fmt(item.total)}</td>
                    <td style={{padding:"6px 8px"}}>
                      <select value={item.sales_id} onChange={e=>updateItem(i,"sales_id",e.target.value)} style={{fontSize:11.5,padding:"4px 6px",border:"1px solid #e2e8f0",borderRadius:5,background:"#fff",width:"100%"}}>
                        <option value="">- Pilih -</option>
                        {SALES.map(s=><option key={s.id} value={s.id}>{s.nama}</option>)}
                      </select>
                    </td>
                    <td style={{padding:"6px 8px"}}><button onClick={()=>removeItem(i)} style={{background:"#fee2e2",border:"none",color:"#dc2626",borderRadius:5,width:26,height:26,cursor:"pointer",fontSize:12}}>✕</button></td>
                  </tr>
                ))}</tbody>
              </table>
            </div>
          )}
          <div style={{display:"flex",justifyContent:"flex-end",gap:20,marginTop:16,padding:"12px 0",borderTop:"2px solid #e2e8f0"}}>
            <div style={{textAlign:"center"}}><div style={{fontSize:11,color:"#94a3b8",marginBottom:3}}>Sub Total</div><div style={{fontWeight:700,color:"#1a2e4a"}}>Rp {fmt(subTotal)}</div></div>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:11,color:"#94a3b8",marginBottom:3}}>Diskon</div>
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                <input type="number" value={form.diskon_global} onChange={e=>F("diskon_global",parseFloat(e.target.value)||0)} style={{width:80,padding:"4px 8px",border:"1px solid #e2e8f0",borderRadius:5,textAlign:"right",fontSize:13,fontFamily:"inherit"}}/>
                <div style={{display:"flex",border:"1px solid #e2e8f0",borderRadius:5,overflow:"hidden"}}>
                  {["%","Rp"].map(t=><button key={t} onClick={()=>F("diskon_global_tipe",t==="%"?"pct":"rp")} style={{padding:"4px 8px",border:"none",background:form.diskon_global_tipe===(t==="%"?"pct":"rp")?"#1a2e4a":"#f8fafc",color:form.diskon_global_tipe===(t==="%"?"pct":"rp")?"#fff":"#64748b",fontSize:11,cursor:"pointer",fontWeight:600}}>{t}</button>)}
                </div>
              </div>
            </div>
            <div style={{textAlign:"center"}}><div style={{fontSize:11,color:"#94a3b8",marginBottom:3}}>Total</div><div style={{fontWeight:700,fontSize:16,color:"#1a2e4a"}}>Rp {fmt(grandTotal)}</div></div>
          </div>
        </div>
      )}

      {activeTab==="info"&&(
        <div style={{background:"#fff",padding:"18px"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:24}}>
            <div>
              <div style={{fontSize:14,fontWeight:700,color:"#1a2e4a",marginBottom:14}}>📋 Info lainnya</div>
              <div style={{display:"flex",flexDirection:"column",gap:12}}>
                <div className="form-group"><label className="form-label">Syarat Pembayaran</label><div style={{display:"flex",gap:6}}><div style={{flex:1,background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:7,padding:"8px 11px",fontSize:13,color:form.syarat?"#1a2e4a":"#94a3b8"}}>{form.syarat||"Otomatis dari pelanggan"}</div></div></div>
                <div className="form-group"><label className="form-label">Alamat</label><textarea className="form-textarea" value={form.alamat} onChange={e=>F("alamat",e.target.value)} style={{minHeight:70}}/></div>
                <div className="form-group"><label className="form-label">Cabang</label><select className="form-select" value={form.cabang} onChange={e=>F("cabang",e.target.value)}>{CABANG.map(c=><option key={c}>{c}</option>)}</select></div>
                <div className="form-group"><label className="form-label">Keterangan</label><textarea className="form-textarea" value={form.keterangan} onChange={e=>F("keterangan",e.target.value)} style={{minHeight:70}} placeholder="Catatan khusus..."/></div>
                <div className="form-group"><label className="form-label">Kontak</label><input className="form-input" placeholder="Nama kontak PIC pelanggan..."/></div>
              </div>
            </div>
            <div>
              <div style={{fontSize:14,fontWeight:700,color:"#1a2e4a",marginBottom:14}}>📎 Info Tambahan</div>
              <div className="form-group"><label className="form-label">Catatan Penjualan</label><textarea className="form-textarea" style={{minHeight:120}} placeholder="Catatan internal atau untuk pelanggan..."/></div>
            </div>
          </div>
        </div>
      )}

      {activeTab==="biaya"&&(
        <div style={{background:"#fff",padding:"18px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:14}}>
            <div className="form-group" style={{flex:1,maxWidth:360}}>
              <label className="form-label">Cari/Pilih Akun Perkiraan</label>
              <COASearch onSelect={(coa)=>{if(coa)setForm(f=>({...f,biaya_lain:[...f.biaya_lain||[],{kode:coa.kode,nama:coa.nama,jumlah:0}];}));}} placeholder="Cari akun biaya..."/>
            </div>
            <div style={{textAlign:"right"}}><div style={{fontSize:11,color:"#94a3b8",marginBottom:3}}>Biaya Lainnya</div><div style={{fontWeight:700,color:"#dc2626"}}>Rp {fmt(form.biaya_lain?.reduce((a,b)=>a+(parseFloat(b.jumlah)||0),0)||0)}</div></div>
          </div>
          {(!form.biaya_lain||form.biaya_lain.length===0)?(
            <div style={{textAlign:"center",padding:"40px 20px",color:"#94a3b8",background:"#f8fafc",borderRadius:8,border:"1px dashed #e2e8f0"}}><div style={{fontSize:32,marginBottom:8}}>💰</div><div>Belum ada biaya lainnya</div></div>
          ):(
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12.5}}>
              <thead><tr style={{background:"#1a2e4a",color:"#fff"}}><th style={{padding:"8px 10px",textAlign:"left"}}>Nama Biaya</th><th style={{padding:"8px 10px",textAlign:"left"}}>Kode #</th><th style={{padding:"8px 10px",textAlign:"right"}}>Jumlah</th><th style={{padding:"8px 10px",width:32}}></th></tr></thead>
              <tbody>{form.biaya_lain.map((b,i)=>(
                <tr key={i} style={{borderBottom:"1px solid #f1f5f9"}}>
                  <td style={{padding:"8px 10px",fontWeight:600}}>{b.nama}</td>
                  <td style={{padding:"8px 10px",fontFamily:"monospace",color:"#7c3aed",fontSize:11}}>{b.kode}</td>
                  <td style={{padding:"8px 10px"}}><input type="number" value={b.jumlah} onChange={e=>{const nl=[...form.biaya_lain];nl[i].jumlah=parseFloat(e.target.value)||0;F("biaya_lain",nl);}} style={{width:120,padding:"4px 8px",border:"1px solid #e2e8f0",borderRadius:5,textAlign:"right",fontFamily:"inherit",fontSize:12}}/></td>
                  <td style={{padding:"8px 10px"}}><button onClick={()=>F("biaya_lain",form.biaya_lain.filter((_,j)=>j!==i))} style={{background:"#fee2e2",border:"none",color:"#dc2626",borderRadius:5,width:26,height:26,cursor:"pointer",fontSize:12}}>✕</button></td>
                </tr>
              ))}</tbody>
            </table>
          )}
        </div>
      )}

      <div style={{position:"sticky",bottom:0,background:"#fff",borderTop:"2px solid #e2e8f0",padding:"12px 18px",display:"flex",justifyContent:"space-between",alignItems:"center",boxShadow:"0 -2px 8px rgba(0,0,0,.05)",zIndex:90}}>
        <div style={{fontSize:13,color:"#64748b"}}>
          <span style={{fontWeight:600,color:"#1a2e4a"}}>Total: Rp {fmt(grandTotal)}</span>
          {form.pelanggan&&<span style={{marginLeft:12}}>{" . "} {form.pelanggan}</span>}
        </div>
        <div style={{display:"flex",gap:8}}>
          <button className="btn btn-secondary" onClick={()=>{setView("list");setEditData(null);setForm(FORM_INIT);setPelQ("");}}>Batal</button>
          <button className="btn" style={{background:"#f59e0b",color:"#fff",border:"none",padding:"8px 16px",borderRadius:7,fontSize:12.5,fontWeight:600,cursor:"pointer"}} onClick={simpan}>💾 Simpan</button>
          <button className="btn btn-primary" onClick={simpan}>💾 Simpan & Tutup</button>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// PESANAN PENJUALAN (SO) - dengan ambil referensi dari Penawaran
// ============================================================
function PesananPenjualanPage(){
  const[view,setView]=useState("list");
  const[editData,setEditData]=useState(null);
  const[detailData,setDetailData]=useState(null);
  const[showRefModal,setShowRefModal]=useState(false);

  // Data Penawaran yang tersedia untuk diambil sebagai referensi (belum diproses / sebagian)
  const[penawaranList,setPenawaranList]=useState([
    {id:1,no:"PP260300001",tanggal:"2026-03-07",pelanggan_id:1,pelanggan:"CV Maju Jaya",status:"belum_diproses",items:[
      {produk_id:1,kode:"SE02-KM-PN-001",nama:"Spon Eva 2mm Polos Hitam BAL120",satuan:"BAL",harga:19000,qty_asli:5,qty_sisa:5,diskon:0,diskon_tipe:"pct"},
      {produk_id:3,kode:"KRT-A4-80",nama:"Kertas HVS A4 80gr",satuan:"Rim",harga:65000,qty_asli:7,qty_sisa:7,diskon:0,diskon_tipe:"pct"},
    ]},
    {id:2,no:"PP260300002",tanggal:"2026-03-10",pelanggan_id:2,pelanggan:"PT Sumber Rejeki",status:"sebagian",items:[
      {produk_id:4,kode:"TNT-EP-HIT",nama:"Tinta Printer Epson Hitam",satuan:"Botol",harga:85000,qty_asli:10,qty_sisa:6,diskon:0,diskon_tipe:"pct"},
    ]},
  ]);

  const[list,setList]=useState([
    {id:1,no:"SO260300001",tanggal:"2026-03-08",pelanggan_id:1,pelanggan:"CV Maju Jaya",status:"belum_diproses",
      ref_penawaran:null,
      items:[{produk_id:2,kode:"SE02-KM-PN-002",nama:"Spon Eva 2mm Polos Putih 125x210cm",qty:3,satuan:"Pcs",harga:22000,diskon:0,diskon_tipe:"pct",total:66000,sales_id:"",gudang:"Kantor Pusat"}],
      syarat:"NET30",alamat:"Jl. Merdeka No. 45, Jakarta Pusat",cabang:"Kantor Pusat",keterangan:"",biaya_lain:[],
      sub_total:66000,diskon_global:0,diskon_global_tipe:"pct",total:66000,uang_muka:0,
      riwayat:[{tipe:"Pesanan Penjualan",no:"SO260300001"}]},
  ]);

  const genNo=(prefix)=>{const d=new Date();return prefix+String(d.getFullYear()).slice(2)+String(d.getMonth()+1).padStart(2,"0")+String(list.length+1).padStart(5,"0");};
  const FORM_INIT={no:"",tanggal:today(),pelanggan_id:"",pelanggan:"",syarat:"",alamat:"",cabang:"Kantor Pusat",keterangan:"",items:[],biaya_lain:[],diskon_global:0,diskon_global_tipe:"pct",ref_penawaran:null,riwayat:[]};
  const[form,setForm]=useState(FORM_INIT);
  const F=(k,v)=>setForm(f=>({...f,[k]:v}));
  const[activeTab,setActiveTab]=useState("barang");

  // Ref modal state
  const[refPelangganItems,setRefPelangganItems]=useState([]); // items dari penawaran terpilih dengan checklist
  const[selectedPenawaran,setSelectedPenawaran]=useState(null);

  const addPelanggan=(p)=>{
    if(!p){setForm(f=>({...f,pelanggan_id:"",pelanggan:"",syarat:"",alamat:""}));return;}
    setForm(f=>({...f,pelanggan_id:p.id,pelanggan:p.nama,syarat:p.syarat,alamat:p.alamat}));
  };

  const addItem=(p)=>{
    const exists=form.items.findIndex(i=>i.produk_id===p.id&&!i.dari_referensi);
    if(exists>=0){
      setForm(f=>{const ni=[...f.items];ni[exists].qty+=1;ni[exists].total=hitungTotal(ni[exists]);return{...f,items:ni};});
    }else{
      setForm(f=>({...f,items:[...f.items,{produk_id:p.id,kode:p.kode,nama:p.nama,qty:1,satuan:p.satuan,harga:p.harga,diskon:0,diskon_tipe:"pct",total:p.harga,sales_id:"",gudang:f.cabang}]}));
    }
  };

  const hitungTotal=(item)=>{
    const gross=item.qty*item.harga;
    return item.diskon_tipe==="pct"?gross*(1-item.diskon/100):Math.max(0,gross-item.diskon);
  };

  const updateItem=(idx,k,v)=>{
    setForm(f=>{
      const ni=[...f.items];
      ni[idx]={...ni[idx],[k]:["qty","harga","diskon"].includes(k)?(parseFloat(v)||0):v};
      ni[idx].total=hitungTotal(ni[idx]);
      return{...f,items:ni};
    });
  };

  const removeItem=(idx)=>setForm(f=>({...f,items:f.items.filter((_,i)=>i!==idx)}));

  const setGudangSemua=(gudang)=>{
    setForm(f=>({...f,items:f.items.map(i=>({...i,gudang}))}));
  };

  const subTotal=form.items.reduce((a,i)=>a+i.total,0);
  const diskonGlobal=form.diskon_global_tipe==="pct"?subTotal*form.diskon_global/100:(parseFloat(form.diskon_global)||0);
  const biayaTotal=(form.biaya_lain||[]).reduce((a,b)=>a+(parseFloat(b.jumlah)||0),0);
  const grandTotal=subTotal-diskonGlobal+biayaTotal;

  // ---- Ambil Referensi dari Penawaran ----
  const pelangganPenawaran=form.pelanggan_id?penawaranList.filter(p=>p.pelanggan_id===form.pelanggan_id&&(p.status==="belum_diproses"||p.status==="sebagian")):[];

  const openRefModal=()=>{
    if(!form.pelanggan_id)return alert("Pilih pelanggan terlebih dahulu!");
    if(pelangganPenawaran.length===0)return alert("Tidak ada Penawaran Penjualan yang belum diproses untuk pelanggan ini.");
    setShowRefModal(true);
    setSelectedPenawaran(null);
    setRefPelangganItems([]);
  };

  const pickPenawaran=(pp)=>{
    setSelectedPenawaran(pp);
    // default semua tercentang dengan qty sisa
    setRefPelangganItems(pp.items.filter(i=>i.qty_sisa>0).map(i=>({...i,checked:true,qty_ambil:i.qty_sisa})));
  };

  const toggleRefItem=(idx)=>setRefPelangganItems(r=>{const n=[...r];n[idx].checked=!n[idx].checked;return n;});
  const updateRefQty=(idx,v)=>setRefPelangganItems(r=>{const n=[...r];n[idx].qty_ambil=Math.min(parseFloat(v)||0,n[idx].qty_sisa);return n;});

  const terapkanReferensi=()=>{
    const dipilih=refPelangganItems.filter(i=>i.checked&&i.qty_ambil>0);
    if(dipilih.length===0)return alert("Pilih minimal 1 barang!");
    const newItems=dipilih.map(i=>({
      produk_id:i.produk_id,kode:i.kode,nama:i.nama,qty:i.qty_ambil,satuan:i.satuan,harga:i.harga,
      diskon:i.diskon,diskon_tipe:i.diskon_tipe,total:i.qty_ambil*i.harga*(i.diskon_tipe==="pct"?(1-i.diskon/100):1),
      sales_id:"",gudang:form.cabang,dari_referensi:true,ref_no:selectedPenawaran.no,ref_produk_id:i.produk_id
    }));
    setForm(f=>({
      ...f,
      items:[...f.items,...newItems],
      ref_penawaran:selectedPenawaran.no,
      riwayat:[{tipe:"Penawaran Penjualan",no:selectedPenawaran.no},...(f.riwayat||[])]
    }));
    setShowRefModal(false);
  };

  const hapusReferensiPenawaran=()=>{
    setForm(f=>({...f,ref_penawaran:null,riwayat:(f.riwayat||[]).filter(r=>r.tipe!=="Penawaran Penjualan")}));
  };

  const simpan=()=>{
    if(!form.pelanggan)return alert("Pilih pelanggan dulu!");
    if(!form.items.length)return alert("Tambahkan minimal 1 item!");
    const no=editData?editData.no:genNo("SO");
    const data={...form,no,id:editData?editData.id:Date.now(),status:"belum_diproses",sub_total:subTotal,total:grandTotal,uang_muka:0,riwayat:form.riwayat&&form.riwayat.length?form.riwayat:[{tipe:"Pesanan Penjualan",no}]};
    if(editData)setList(l=>l.map(x=>x.id===editData.id?data:x));
    else setList(l=>[data,...l]);

    // Update stok sisa di penawaran jika ada referensi
    if(form.ref_penawaran){
      setPenawaranList(pl=>pl.map(pp=>{
        if(pp.no!==form.ref_penawaran)return pp;
        const updatedItems=pp.items.map(it=>{
          const used=form.items.find(fi=>fi.dari_referensi&&fi.ref_produk_id===it.produk_id);
          if(!used)return it;
          return{...it,qty_sisa:Math.max(0,it.qty_sisa-used.qty)};
        });
        const totalSisa=updatedItems.reduce((a,i)=>a+i.qty_sisa,0);
        const totalAsli=updatedItems.reduce((a,i)=>a+i.qty_asli,0);
        const newStatus=totalSisa===0?"selesai":totalSisa<totalAsli?"sebagian":"belum_diproses";
        return{...pp,items:updatedItems,status:newStatus};
      }));
    }

    setView("list");setEditData(null);setForm(FORM_INIT);
  };

  const openNew=()=>{setForm({...FORM_INIT,no:genNo("SO")});setEditData(null);setActiveTab("barang");setView("form");};
  const openEdit=(item)=>{setForm({...item});setEditData(item);setActiveTab("barang");setView("form");};
  const hapus=(id)=>{if(confirm("Hapus pesanan ini?"))setList(l=>l.filter(x=>x.id!==id));};

  const STATUS_SO={belum_diproses:["#dbeafe","#1d4ed8","Belum Diproses"],sebagian:["#fef3c7","#d97706","Terproses Sebagian"],selesai:["#d1fae5","#059669","Sudah Diproses"],batal:["#fee2e2","#dc2626","Dibatalkan"]};

  // ==================== LIST VIEW ====================
  if(view==="list") return(
    <div>
      <div className="page-header">
        <div><div className="page-title">Pesanan Penjualan</div><div className="page-sub">Penjualan &gt; Pesanan Penjualan (SO)</div></div>
        <button className="btn btn-primary" onClick={openNew}>+ Data Baru</button>
      </div>
      <div className="card">
        <div className="card-header"><span className="card-title">Daftar Pesanan Penjualan</span><span style={{fontSize:11,color:"#94a3b8"}}>{list.length} data</span></div>
        <div className="table-wrap">
          <table>
            <thead><tr><th>Nomor</th><th>Tanggal</th><th>Pelanggan</th><th style={{textAlign:"right"}}>Sub Total</th><th style={{textAlign:"right"}}>Uang Muka</th><th style={{textAlign:"right"}}>Total</th><th>Status</th><th>Aksi</th></tr></thead>
            <tbody>
              {list.length===0&&<tr><td colSpan={8} style={{textAlign:"center",padding:30,color:"#94a3b8"}}>Belum ada data</td></tr>}
              {list.map(item=>{
                const sb=STATUS_SO[item.status]||["#f1f5f9","#64748b","-"];
                return(
                  <tr key={item.id}>
                    <td style={{fontWeight:700,color:"#1d4ed8",cursor:"pointer",fontFamily:"monospace"}} onClick={()=>{setDetailData(item);setView("detail");}}>{item.no}</td>
                    <td style={{color:"#64748b"}}>{fmtTgl(item.tanggal)}</td>
                    <td style={{fontWeight:600}}>{item.pelanggan}</td>
                    <td style={{textAlign:"right",color:"#64748b"}}>{fmtRp(item.sub_total)}</td>
                    <td style={{textAlign:"right",color:"#059669"}}>{item.uang_muka>0?fmtRp(item.uang_muka):"-"}</td>
                    <td style={{textAlign:"right",fontWeight:700}}>{fmtRp(item.total)}</td>
                    <td><span className="badge" style={{background:sb[0],color:sb[1]}}>{sb[2]}</span></td>
                    <td>
                      <div style={{display:"flex",gap:4}}>
                        <button className="btn btn-secondary btn-sm" onClick={()=>{setDetailData(item);setView("detail");}}>&#128065;</button>
                        <button className="btn btn-secondary btn-sm" onClick={()=>openEdit(item)}>&#9998;</button>
                        <button className="btn btn-danger btn-sm" onClick={()=>hapus(item.id)}>&#128465;</button>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );

  // ==================== DETAIL VIEW ====================
  if(view==="detail"&&detailData){
    const sb=STATUS_SO[detailData.status]||["#f1f5f9","#64748b","-"];
    return(
      <div>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16,flexWrap:"wrap"}}>
          <button onClick={()=>setView("list")} style={{background:"none",border:"none",color:"#1d4ed8",cursor:"pointer",fontSize:13,fontWeight:600}}>&#8592; Kembali</button>
          <span style={{color:"#94a3b8"}}>|</span>
          <span style={{fontWeight:700,fontFamily:"monospace",color:"#1a2e4a"}}>{detailData.no}</span>
          <span className="badge" style={{background:sb[0],color:sb[1]}}>{sb[2]}</span>
          <div style={{marginLeft:"auto",display:"flex",gap:8}}>
            <button className="btn btn-secondary btn-sm" onClick={()=>openEdit(detailData)}>Edit</button>
            <select className="form-select" style={{fontSize:12,padding:"5px 10px",color:"#1d4ed8",fontWeight:600,border:"1px solid #3b82f6"}} onChange={e=>{if(e.target.value)alert("Proses ke: "+e.target.value);e.target.value="";}}>
              <option value="">Proses...</option>
              <option value="sj">Pengiriman Pesanan (SJ)</option>
              <option value="inv">Faktur Penjualan</option>
              <option value="um">Uang Muka Penjualan</option>
            </select>
          </div>
        </div>

        {/* Riwayat Hyperlink */}
        {detailData.riwayat&&detailData.riwayat.length>1&&(
          <div className="info-box" style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <strong>Riwayat:</strong>
            {detailData.riwayat.slice().reverse().map((r,i,arr)=>(
              <span key={i} style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{textDecoration:"underline",cursor:"pointer",fontWeight:600}}>{r.tipe} ({r.no})</span>
                {i<arr.length-1&&<span>&#8594;</span>}
              </span>
            ))}
          </div>
        )}

        <div className="card"><div className="card-body">
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:16}}>
            <div>
              <div style={{fontSize:11,color:"#94a3b8",fontWeight:600,textTransform:"uppercase",marginBottom:3}}>Pelanggan</div>
              <div style={{fontWeight:700,fontSize:14,color:"#1a2e4a"}}>{detailData.pelanggan}</div>
              <div style={{fontSize:12,color:"#64748b"}}>{detailData.alamat}</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:11,color:"#94a3b8",fontWeight:600,textTransform:"uppercase",marginBottom:3}}>Tanggal</div>
              <div style={{fontWeight:600}}>{detailData.tanggal}</div>
              <div style={{fontSize:12,color:"#64748b"}}>Syarat: {detailData.syarat||"-"} | Cabang: {detailData.cabang}</div>
            </div>
          </div>
          <div className="table-wrap">
            <table>
              <thead><tr><th>Kode</th><th>Nama Barang</th><th style={{textAlign:"center"}}>Qty</th><th>Sat.</th><th>Gudang</th><th style={{textAlign:"right"}}>Harga</th><th style={{textAlign:"right"}}>Diskon</th><th style={{textAlign:"right"}}>Total</th></tr></thead>
              <tbody>
                {detailData.items.map((item,i)=>(
                  <tr key={i}>
                    <td style={{fontFamily:"monospace",fontSize:11,color:"#7c3aed"}}>{item.kode}</td>
                    <td style={{fontWeight:600}}>{item.nama}</td>
                    <td style={{textAlign:"center"}}>{item.qty}</td>
                    <td style={{color:"#64748b"}}>{item.satuan}</td>
                    <td style={{color:"#64748b",fontSize:11.5}}>{item.gudang||"-"}</td>
                    <td style={{textAlign:"right"}}>{fmtRp(item.harga)}</td>
                    <td style={{textAlign:"right",color:"#dc2626"}}>{item.diskon>0?(item.diskon_tipe==="pct"?item.diskon+"%":fmtRp(item.diskon)):"-"}</td>
                    <td style={{textAlign:"right",fontWeight:700}}>{fmtRp(item.total)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div style={{display:"flex",justifyContent:"flex-end",marginTop:14}}>
            <table style={{width:280,fontSize:13}}><tbody>
              <tr><td style={{padding:"4px 8px",color:"#64748b"}}>Sub Total</td><td style={{padding:"4px 8px",textAlign:"right",fontWeight:600}}>{fmtRp(detailData.sub_total)}</td></tr>
              {detailData.uang_muka>0&&<tr><td style={{padding:"4px 8px",color:"#059669"}}>Uang Muka</td><td style={{padding:"4px 8px",textAlign:"right",color:"#059669",fontWeight:600}}>- {fmtRp(detailData.uang_muka)}</td></tr>}
              <tr style={{background:"#1a2e4a",color:"#fff"}}><td style={{padding:"8px",fontWeight:700}}>TOTAL</td><td style={{padding:"8px",textAlign:"right",fontWeight:700}}>{fmtRp(detailData.total-detailData.uang_muka)}</td></tr>
            </tbody></table>
          </div>
        </div></div>
      </div>
    );
  }

  // ==================== FORM VIEW ====================
  return(
    <div style={{margin:"-20px"}}>
      <div style={{background:"#fff",borderBottom:"1px solid #e2e8f0",padding:"0 16px",position:"sticky",top:56,zIndex:90,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
        <div style={{display:"flex",alignItems:"center"}}>
          <div style={{padding:"10px 16px",borderBottom:"3px solid #3b82f6",color:"#1d4ed8",fontWeight:700,fontSize:13,display:"flex",alignItems:"center",gap:6}}>
            * {editData?"Edit Pesanan":"Data Baru"}
            <button onClick={()=>{setView("list");setEditData(null);setForm(FORM_INIT);}} style={{marginLeft:8,background:"none",border:"none",color:"#94a3b8",cursor:"pointer",fontSize:14}}>x</button>
          </div>
        </div>
      </div>

      <div style={{background:"#fff",padding:"14px 18px",borderBottom:"1px solid #f1f5f9"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:12,alignItems:"end",marginBottom:12}}>
          <div className="form-group">
            <label className="form-label">Dipesan oleh <span className="req">*</span></label>
            <PelangganSearch onSelect={addPelanggan} value={form.pelanggan?"["+(PELANGGAN_DATA.find(p=>p.id===form.pelanggan_id)?.kode||"")+"] "+form.pelanggan:""}/>
          </div>
          <div className="form-group"><label className="form-label">Mata Uang</label><select className="form-select" style={{width:90}}><option>IDR</option></select></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <div className="form-group"><label className="form-label">Nomor #</label><input className="form-input" value={form.no} onChange={e=>F("no",e.target.value)} style={{fontFamily:"monospace"}}/></div>
            <div className="form-group"><label className="form-label">Tanggal <span className="req">*</span></label><input className="form-input" type="date" value={form.tanggal} onChange={e=>F("tanggal",e.target.value)}/></div>
          </div>
        </div>

        {/* Referensi Penawaran badge */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            {form.ref_penawaran&&(
              <span style={{display:"inline-flex",alignItems:"center",gap:6,background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:20,padding:"4px 10px",fontSize:11.5}}>
                <span style={{color:"#1d4ed8",fontWeight:600}}>Ref: {form.ref_penawaran}</span>
                <button onClick={hapusReferensiPenawaran} style={{background:"none",border:"none",color:"#dc2626",cursor:"pointer",fontWeight:700,fontSize:13,lineHeight:1}}>x</button>
              </span>
            )}
          </div>
          <button className="btn btn-secondary btn-sm" onClick={openRefModal}>&#128279; Ambil Referensi Penawaran</button>
        </div>
      </div>

      <div style={{background:"#fff",borderBottom:"1px solid #e2e8f0"}}>
        <div style={{display:"flex",paddingLeft:18}}>
          {[["barang","Barang & Jasa"],["info","Info Lainnya"],["biaya","Biaya Lainnya"]].map(([t,l])=>(
            <button key={t} onClick={()=>setActiveTab(t)} style={{padding:"9px 16px",border:"none",borderBottom:"3px solid "+(activeTab===t?"#3b82f6":"transparent"),background:"transparent",fontWeight:activeTab===t?700:500,color:activeTab===t?"#1d4ed8":"#64748b",cursor:"pointer",fontSize:12.5}}>{l}</button>
          ))}
        </div>
      </div>

      {activeTab==="barang"&&(
        <div style={{background:"#fff",padding:"14px 18px"}}>
          <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:14}}>
            <ProdukSearch onSelect={addItem}/>
            <span style={{fontSize:12,color:"#64748b",whiteSpace:"nowrap"}}>{form.items.length} Barang ({form.items.reduce((a,i)=>a+i.qty,0)})</span>
          </div>

          {/* Set gudang untuk semua */}
          {form.items.length>0&&(
            <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:10,background:"#f8fafc",padding:"8px 12px",borderRadius:8,border:"1px solid #e2e8f0"}}>
              <span style={{fontSize:11.5,color:"#64748b",fontWeight:600}}>&#127963; Set gudang untuk semua barang:</span>
              <select className="form-select" style={{width:180,padding:"5px 8px",fontSize:12}} onChange={e=>{if(e.target.value)setGudangSemua(e.target.value);}}>
                <option value="">Pilih gudang...</option>
                {CABANG_DATA.map(c=><option key={c} value={c}>{c}</option>)}
              </select>
            </div>
          )}

          {form.items.length===0?(
            <div style={{textAlign:"center",padding:"40px 20px",color:"#94a3b8",background:"#f8fafc",borderRadius:8,border:"1px dashed #e2e8f0"}}>
              <div style={{fontSize:32,marginBottom:8}}>&#128230;</div><div style={{fontSize:13}}>Belum ada barang</div>
            </div>
          ):(
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12.5}}>
                <thead><tr style={{background:"#1a2e4a",color:"#fff"}}>
                  <th style={{padding:"8px 10px"}}></th>
                  <th style={{padding:"8px 10px",textAlign:"left"}}>Kode</th>
                  <th style={{padding:"8px 10px",textAlign:"left"}}>Nama Barang</th>
                  <th style={{padding:"8px 10px",textAlign:"center"}}>Qty</th>
                  <th style={{padding:"8px 10px"}}>Sat.</th>
                  <th style={{padding:"8px 10px"}}>Gudang</th>
                  <th style={{padding:"8px 10px",textAlign:"right"}}>Harga</th>
                  <th style={{padding:"8px 10px",textAlign:"right"}}>Diskon</th>
                  <th style={{padding:"8px 10px",textAlign:"right"}}>Total</th>
                  <th style={{padding:"8px 10px"}}>Sales</th>
                  <th style={{padding:"8px 10px"}}></th>
                </tr></thead>
                <tbody>{form.items.map((item,i)=>(
                  <tr key={i} style={{borderBottom:"1px solid #f1f5f9",background:item.dari_referensi?"#f0fdf4":(i%2===0?"#fff":"#fafbff")}}>
                    <td style={{padding:"6px 8px",textAlign:"center"}}>{item.dari_referensi&&<span title={"Dari "+item.ref_no} style={{fontSize:10,color:"#059669"}}>&#128279;</span>}</td>
                    <td style={{padding:"6px 8px",fontFamily:"monospace",fontSize:11,color:"#7c3aed"}}>{item.kode}</td>
                    <td style={{padding:"6px 8px",fontWeight:600}}>{item.nama}</td>
                    <td style={{padding:"6px 8px"}}><input type="number" value={item.qty} onChange={e=>updateItem(i,"qty",e.target.value)} min="1" style={{width:50,padding:"4px 6px",border:"1px solid #e2e8f0",borderRadius:5,textAlign:"center",fontSize:12,fontFamily:"inherit"}}/></td>
                    <td style={{padding:"6px 8px",color:"#64748b"}}>{item.satuan}</td>
                    <td style={{padding:"6px 8px"}}>
                      <select value={item.gudang||""} onChange={e=>updateItem(i,"gudang",e.target.value)} style={{fontSize:11,padding:"4px 6px",border:"1px solid #e2e8f0",borderRadius:5,width:110}}>
                        {CABANG_DATA.map(c=><option key={c} value={c}>{c}</option>)}
                      </select>
                    </td>
                    <td style={{padding:"6px 8px"}}><input type="number" value={item.harga} onChange={e=>updateItem(i,"harga",e.target.value)} style={{width:90,padding:"4px 6px",border:"1px solid #e2e8f0",borderRadius:5,textAlign:"right",fontSize:12,fontFamily:"inherit"}}/></td>
                    <td style={{padding:"6px 8px"}}>
                      <div style={{display:"flex",gap:4,alignItems:"center"}}>
                        <input type="number" value={item.diskon} onChange={e=>updateItem(i,"diskon",e.target.value)} style={{width:50,padding:"4px 6px",border:"1px solid #e2e8f0",borderRadius:5,textAlign:"right",fontSize:12,fontFamily:"inherit"}}/>
                        <div style={{display:"flex",border:"1px solid #e2e8f0",borderRadius:5,overflow:"hidden"}}>
                          {["%","Rp"].map(t=><button key={t} onClick={()=>updateItem(i,"diskon_tipe",t==="%"?"pct":"rp")} style={{padding:"3px 6px",border:"none",background:item.diskon_tipe===(t==="%"?"pct":"rp")?"#1a2e4a":"#f8fafc",color:item.diskon_tipe===(t==="%"?"pct":"rp")?"#fff":"#64748b",fontSize:10,cursor:"pointer",fontWeight:600}}>{t}</button>)}
                        </div>
                      </div>
                    </td>
                    <td style={{padding:"6px 8px",textAlign:"right",fontWeight:700}}>{fmtRp(item.total)}</td>
                    <td style={{padding:"6px 8px"}}>
                      <select value={item.sales_id} onChange={e=>updateItem(i,"sales_id",e.target.value)} style={{fontSize:11,padding:"4px 6px",border:"1px solid #e2e8f0",borderRadius:5,width:100}}>
                        <option value="">-Pilih-</option>
                        {SALES_DATA.map(s=><option key={s.id} value={s.id}>{s.nama}</option>)}
                      </select>
                    </td>
                    <td style={{padding:"6px 8px"}}><button onClick={()=>removeItem(i)} style={{background:"#fee2e2",border:"none",color:"#dc2626",borderRadius:5,width:24,height:24,cursor:"pointer",fontSize:11}}>x</button></td>
                  </tr>
                ))}</tbody>
              </table>
            </div>
          )}

          <div style={{display:"flex",justifyContent:"flex-end",gap:20,marginTop:16,padding:"12px 0",borderTop:"2px solid #e2e8f0"}}>
            <div style={{textAlign:"center"}}><div style={{fontSize:11,color:"#94a3b8",marginBottom:3}}>Sub Total</div><div style={{fontWeight:700}}>{fmtRp(subTotal)}</div></div>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:11,color:"#94a3b8",marginBottom:3}}>Diskon</div>
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                <input type="number" value={form.diskon_global} onChange={e=>F("diskon_global",parseFloat(e.target.value)||0)} style={{width:70,padding:"4px 8px",border:"1px solid #e2e8f0",borderRadius:5,textAlign:"right",fontSize:13,fontFamily:"inherit"}}/>
                <div style={{display:"flex",border:"1px solid #e2e8f0",borderRadius:5,overflow:"hidden"}}>
                  {["%","Rp"].map(t=><button key={t} onClick={()=>F("diskon_global_tipe",t==="%"?"pct":"rp")} style={{padding:"4px 8px",border:"none",background:form.diskon_global_tipe===(t==="%"?"pct":"rp")?"#1a2e4a":"#f8fafc",color:form.diskon_global_tipe===(t==="%"?"pct":"rp")?"#fff":"#64748b",fontSize:11,cursor:"pointer",fontWeight:600}}>{t}</button>)}
                </div>
              </div>
            </div>
            <div style={{textAlign:"center"}}><div style={{fontSize:11,color:"#94a3b8",marginBottom:3}}>Total</div><div style={{fontWeight:700,fontSize:16}}>{fmtRp(grandTotal)}</div></div>
          </div>
        </div>
      )}

      {activeTab==="info"&&(
        <div style={{background:"#fff",padding:"18px"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:24}}>
            <div>
              <div style={{fontSize:14,fontWeight:700,color:"#1a2e4a",marginBottom:14}}>Info Lainnya</div>
              <div style={{display:"flex",flexDirection:"column",gap:12}}>
                <div className="form-group"><label className="form-label">Syarat Pembayaran</label><div style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:7,padding:"8px 11px",fontSize:13,color:form.syarat?"#1a2e4a":"#94a3b8"}}>{form.syarat||"Otomatis dari pelanggan"}</div></div>
                <div className="form-group"><label className="form-label">Alamat</label><textarea className="form-textarea" value={form.alamat} onChange={e=>F("alamat",e.target.value)} style={{minHeight:70}}/></div>
                <div className="form-group"><label className="form-label">Cabang</label><select className="form-select" value={form.cabang} onChange={e=>F("cabang",e.target.value)}>{CABANG_DATA.map(c=><option key={c}>{c}</option>)}</select></div>
                <div className="form-group"><label className="form-label">Keterangan</label><textarea className="form-textarea" value={form.keterangan} onChange={e=>F("keterangan",e.target.value)} style={{minHeight:70}}/></div>
              </div>
            </div>
            <div>
              <div style={{fontSize:14,fontWeight:700,color:"#1a2e4a",marginBottom:14}}>Info Tambahan</div>
              <div className="form-group"><label className="form-label">Catatan Penjualan</label><textarea className="form-textarea" style={{minHeight:120}}/></div>
            </div>
          </div>
        </div>
      )}

      {activeTab==="biaya"&&(
        <div style={{background:"#fff",padding:"18px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:14}}>
            <div className="form-group" style={{flex:1,maxWidth:360}}>
              <label className="form-label">Cari/Pilih Akun Perkiraan</label>
              <COASearch onSelect={(coa)=>{if(coa)setForm(f=>({...f,biaya_lain:[...(f.biaya_lain||[]),{kode:coa.kode,nama:coa.nama,jumlah:0}]}));}}/>
            </div>
            <div style={{textAlign:"right"}}><div style={{fontSize:11,color:"#94a3b8"}}>Biaya Lainnya</div><div style={{fontWeight:700,color:"#dc2626"}}>{fmtRp(biayaTotal)}</div></div>
          </div>
          {(!form.biaya_lain||form.biaya_lain.length===0)?(
            <div style={{textAlign:"center",padding:"40px 20px",color:"#94a3b8",background:"#f8fafc",borderRadius:8,border:"1px dashed #e2e8f0"}}>Belum ada biaya lainnya</div>
          ):(
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12.5}}>
              <thead><tr style={{background:"#1a2e4a",color:"#fff"}}><th style={{padding:"8px 10px",textAlign:"left"}}>Nama Biaya</th><th style={{padding:"8px 10px",textAlign:"left"}}>Kode</th><th style={{padding:"8px 10px",textAlign:"right"}}>Jumlah</th><th style={{padding:"8px 10px"}}></th></tr></thead>
              <tbody>{form.biaya_lain.map((b,i)=>(
                <tr key={i} style={{borderBottom:"1px solid #f1f5f9"}}>
                  <td style={{padding:"8px 10px",fontWeight:600}}>{b.nama}</td>
                  <td style={{padding:"8px 10px",fontFamily:"monospace",color:"#7c3aed",fontSize:11}}>{b.kode}</td>
                  <td style={{padding:"8px 10px"}}><input type="number" value={b.jumlah} onChange={e=>{const nl=[...form.biaya_lain];nl[i].jumlah=parseFloat(e.target.value)||0;F("biaya_lain",nl);}} style={{width:110,padding:"4px 8px",border:"1px solid #e2e8f0",borderRadius:5,textAlign:"right",fontFamily:"inherit",fontSize:12}}/></td>
                  <td style={{padding:"8px 10px"}}><button onClick={()=>F("biaya_lain",form.biaya_lain.filter((_,j)=>j!==i))} style={{background:"#fee2e2",border:"none",color:"#dc2626",borderRadius:5,width:24,height:24,cursor:"pointer"}}>x</button></td>
                </tr>
              ))}</tbody>
            </table>
          )}
        </div>
      )}

      <div style={{position:"sticky",bottom:0,background:"#fff",borderTop:"2px solid #e2e8f0",padding:"12px 18px",display:"flex",justifyContent:"space-between",alignItems:"center",boxShadow:"0 -2px 8px rgba(0,0,0,.05)",zIndex:90}}>
        <div style={{fontSize:13,color:"#64748b"}}><span style={{fontWeight:600,color:"#1a2e4a"}}>Total: {fmtRp(grandTotal)}</span></div>
        <div style={{display:"flex",gap:8}}>
          <button className="btn btn-secondary" onClick={()=>{setView("list");setEditData(null);setForm(FORM_INIT);}}>Batal</button>
          <button className="btn" style={{background:"#f59e0b",color:"#fff",border:"none",padding:"8px 16px",borderRadius:7,fontSize:12.5,fontWeight:600,cursor:"pointer"}} onClick={simpan}>Simpan</button>
          <button className="btn btn-primary" onClick={simpan}>Simpan & Tutup</button>
        </div>
      </div>

      {/* MODAL AMBIL REFERENSI */}
      {showRefModal&&(
        <div className="modal-overlay" onClick={()=>setShowRefModal(false)}>
          <div className="modal" style={{maxWidth:600}} onClick={e=>e.stopPropagation()}>
            <div className="modal-header"><span className="modal-title">Ambil Referensi Penawaran Penjualan</span><button className="modal-close" onClick={()=>setShowRefModal(false)}>x</button></div>
            <div className="modal-body">
              {!selectedPenawaran?(
                <div>
                  <div className="form-hint" style={{marginBottom:10}}>Pilih nomor Penawaran Penjualan untuk pelanggan {form.pelanggan}:</div>
                  {pelangganPenawaran.map(pp=>(
                    <div key={pp.id} onClick={()=>pickPenawaran(pp)} style={{padding:"12px 14px",border:"1px solid #e2e8f0",borderRadius:8,marginBottom:8,cursor:"pointer"}} onMouseEnter={e=>e.currentTarget.style.background="#f8fafc"} onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <span style={{fontFamily:"monospace",fontWeight:700,color:"#1d4ed8"}}>{pp.no}</span>
                        <span className="badge" style={{background:pp.status==="sebagian"?"#fef3c7":"#dbeafe",color:pp.status==="sebagian"?"#d97706":"#1d4ed8"}}>{pp.status==="sebagian"?"Terproses Sebagian":"Belum Diproses"}</span>
                      </div>
                      <div style={{fontSize:11.5,color:"#64748b",marginTop:6}}>
                        {pp.items.filter(i=>i.qty_sisa>0).map(i=>i.nama+" ("+i.qty_sisa+" "+i.satuan+")").join(", ")}
                      </div>
                    </div>
                  ))}
                </div>
              ):(
                <div>
                  <div style={{marginBottom:10,fontSize:12.5}}>Referensi: <strong style={{fontFamily:"monospace",color:"#1d4ed8"}}>{selectedPenawaran.no}</strong></div>
                  <div style={{display:"flex",flexDirection:"column",gap:6}}>
                    {refPelangganItems.map((it,idx)=>(
                      <div key={idx} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",background:it.checked?"#f0fdf4":"#f8fafc",borderRadius:7,border:"1px solid "+(it.checked?"#86efac":"#e2e8f0")}}>
                        <input type="checkbox" checked={it.checked} onChange={()=>toggleRefItem(idx)} style={{width:16,height:16}}/>
                        <div style={{flex:1}}>
                          <div style={{fontWeight:600,fontSize:12.5}}>{it.nama}</div>
                          <div style={{fontSize:11,color:"#94a3b8"}}>Sisa: {it.qty_sisa} {it.satuan}</div>
                        </div>
                        <input type="number" value={it.qty_ambil} onChange={e=>updateRefQty(idx,e.target.value)} disabled={!it.checked} max={it.qty_sisa} style={{width:70,padding:"5px 8px",border:"1px solid #e2e8f0",borderRadius:5,textAlign:"center"}}/>
                        <span style={{fontSize:11,color:"#64748b",minWidth:35}}>{it.satuan}</span>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
            <div className="modal-footer">
              {selectedPenawaran&&<button className="btn btn-secondary" onClick={()=>setSelectedPenawaran(null)}>&#8592; Pilih Lain</button>}
              <button className="btn btn-secondary" onClick={()=>setShowRefModal(false)}>Batal</button>
              {selectedPenawaran&&<button className="btn btn-primary" onClick={terapkanReferensi}>Lanjut</button>}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function App(){
  const[open,setOpen]=useState(false);
  const[page,setPage]=useState("penawaran-penjualan");
  return(
    <div>
      <div className={`overlay${open?" show":""}`} onClick={()=>setOpen(false)}/>
      <Sidebar open={open} setOpen={setOpen} page={page} setPage={setPage}/>
      <div className={`main-wrap${open?" sidebar-open":""}`}>
        <Topbar page={page} open={open}/>
        <div className="main-content">
          {page==="penawaran-penjualan"&&<PenawaranPenjualanPage/>}
          {page==="pesanan-penjualan"&&<PesananPenjualanPage/>}
          {page!=="penawaran-penjualan"&&page!=="pesanan-penjualan"&&<PlaceholderPage pageId={page}/>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
